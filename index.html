<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Lucro de Produtos</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#b96bb8">
    <meta name="background-color" content="#f8e1f4">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="#b96bb8">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>💖 Controle de Lucro</h1>
        </header>
        <div id="installBanner" style="display:none;text-align:center;margin-bottom:10px;">
            <button id="btnInstall" class="btn-add" style="width:auto;padding:10px 18px;font-size:1rem;">Instalar App</button>
        </div>
            <script src="service-worker-register.js"></script>
            <script>
            // Instalação PWA
            let deferredPrompt;
            const installBanner = document.getElementById('installBanner');
            const btnInstall = document.getElementById('btnInstall');
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                if (installBanner) installBanner.style.display = 'block';
            });
            if (btnInstall) {
                btnInstall.addEventListener('click', async () => {
                    if (deferredPrompt) {
                        deferredPrompt.prompt();
                        const { outcome } = await deferredPrompt.userChoice;
                        if (outcome === 'accepted') installBanner.style.display = 'none';
                        deferredPrompt = null;
                    }
                });
            }
            window.addEventListener('appinstalled', () => {
                if (installBanner) installBanner.style.display = 'none';
            });
            </script>
        <main>
            <form id="product-form" autocomplete="off">
                <div class="input-group">
                    <label for="nome">Nome do Produto</label>
                    <input type="text" id="nome" required maxlength="40" placeholder="Ex: Caneca Fofa">
                </div>
                <div class="input-group">
                    <label for="data">Data da Venda</label>
                    <input type="date" id="data" required>
                </div>
                <div class="input-group">
                    <label for="custo">Custo (R$)</label>
                    <input type="text" id="custo" required placeholder="0,00">
                </div>
                <div class="input-group">
                    <label for="venda">Valor de Venda (R$)</label>
                    <input type="text" id="venda" required placeholder="0,00">
                </div>
                <div class="input-group">
                    <label for="quantidade">Quantidade Vendida</label>
                    <input type="number" id="quantidade" required min="1" value="1">
                </div>
                <button type="submit" class="btn-add">Adicionar Produto</button>
            </form>
            <section class="dashboard" id="dashboard">
                <div class="card dash-card">
                    <span>Total Investido</span>
                    <strong id="total-investido">R$ 0,00</strong>
                </div>
                <div class="card dash-card">
                    <span>Total Vendido</span>
                    <strong id="total-vendido">R$ 0,00</strong>
                </div>
                <div class="card dash-card">
                    <span>Lucro Total</span>
                    <strong id="lucro-total">R$ 0,00</strong>
                </div>
            </section>
            <section id="produtos-lista" class="produtos-lista"></section>
                        <div style="text-align:right;margin-bottom:18px;">
                            <button id="btn-img" type="button" class="btn-add" style="width:auto;padding:10px 18px;font-size:1rem;">Salvar como Imagem</button>
                        </div>
                <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
            <section class="grafico-section">
                <canvas id="lucroChart"></canvas>
            </section>
        </main>
        <footer>
            <p>Feito com 💜 por Bruna</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
